<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}POS{% endblock %} - {{ config.STORE_NAME }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pos.css') }}">
    <link rel="stylesheet" id="themeMaple" href="{{ url_for('static', filename='css/theme-maple.css') }}" disabled>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- 네비게이션 -->
    <nav class="navbar navbar-expand-lg navbar-pos no-print">
        <div class="container-fluid">
            <a class="navbar-brand navbar-brand-pos" href="/">
                <span class="brand-icon"><i class="bi bi-shop"></i></span>
                {{ config.STORE_NAME }}
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    style="border-color: rgba(255,255,255,0.3);">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-grid-1x2-fill"></i> 대시보드
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/checkout' in request.path %}active{% endif %}" href="/checkout">
                            <i class="bi bi-cart-check-fill"></i> 판매/결제
                            <span class="shortcut-hint">F4</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/products' in request.path %}active{% endif %}" href="/products">
                            <i class="bi bi-box-seam-fill"></i> 상품관리
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/sales' in request.path and '/statistics' not in request.path %}active{% endif %}" href="/sales">
                            <i class="bi bi-receipt"></i> 판매이력
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/statistics' in request.path %}active{% endif %}" href="/statistics">
                            <i class="bi bi-graph-up-arrow"></i> 매출통계
                        </a>
                    </li>
                </ul>
                <button class="btn btn-sm me-3 no-print" id="themeToggle" onclick="toggleTheme()"
                        style="border-radius:50px; padding:4px 14px; font-size:0.82rem; font-weight:600;
                               border:1.5px solid rgba(255,255,255,0.3); color:rgba(255,255,255,0.8); background:transparent;">
                    <i class="bi bi-palette-fill"></i> 테마 전환
                </button>
                <span class="navbar-time" id="currentTime"></span>
            </div>
        </div>
    </nav>

    <!-- 메인 콘텐츠 -->
    {% block content %}{% endblock %}

    <!-- 알림 토스트 -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
        <div id="toast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">알림</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script>
        function updateTime() {
            const now = new Date();
            const el = document.getElementById('currentTime');
            if (el) {
                const opts = {year:'numeric', month:'long', day:'numeric', weekday:'short'};
                el.textContent = now.toLocaleDateString('ko-KR', opts) + '  ' +
                    now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
            }
        }
        updateTime();
        setInterval(updateTime, 30000);

        function formatMoney(n) {
            return '₩' + Math.round(n).toLocaleString('ko-KR');
        }

        // 테마 전환
        function toggleTheme() {
            const maple = document.getElementById('themeMaple');
            const isMaple = !maple.disabled;
            maple.disabled = isMaple;
            localStorage.setItem('theme', isMaple ? 'default' : 'maple');
            const btn = document.getElementById('themeToggle');
            btn.innerHTML = isMaple
                ? '<i class="bi bi-palette-fill"></i> 테마 전환'
                : '<i class="bi bi-palette-fill"></i> 기본 테마로';
        }
        // 저장된 테마 복원
        if (localStorage.getItem('theme') === 'maple') {
            document.getElementById('themeMaple').disabled = false;
            document.getElementById('themeToggle').innerHTML = '<i class="bi bi-palette-fill"></i> 기본 테마로';
        }

        function showToast(title, message, type) {
            const t = document.getElementById('toast');
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastBody').textContent = message;
            t.className = 'toast';
            if (type === 'success') t.classList.add('bg-success', 'text-white');
            else if (type === 'error') t.classList.add('bg-danger', 'text-white');
            else if (type === 'warning') t.classList.add('bg-warning');
            new bootstrap.Toast(t).show();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
