{% extends "base.html" %}
{% block title %}대시보드{% endblock %}

{% block content %}
<div class="container-fluid py-4 px-4">
    <!-- 인사말 -->
    <div class="page-header">
        <h4><i class="bi bi-sun-fill" style="color:#ffd166;"></i> 오늘의 현황</h4>
        <span class="text-muted" style="font-size:0.9rem;" id="todayDate"></span>
    </div>

    <!-- 통계 카드 -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
            <div class="stat-card bg-sales">
                <div class="stat-icon"><i class="bi bi-cash-stack"></i></div>
                <div class="stat-label">오늘 매출</div>
                <div class="stat-value" id="todaySales">₩0</div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card bg-cash">
                <div class="stat-icon"><i class="bi bi-wallet2"></i></div>
                <div class="stat-label">현금</div>
                <div class="stat-value" id="todayCash">₩0</div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card bg-card">
                <div class="stat-icon"><i class="bi bi-credit-card-2-front"></i></div>
                <div class="stat-label">카드</div>
                <div class="stat-value" id="todayCard">₩0</div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card bg-count">
                <div class="stat-icon"><i class="bi bi-bag-check"></i></div>
                <div class="stat-label">거래 건수</div>
                <div class="stat-value" id="todayCount">0</div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- 빠른 이동 -->
        <div class="col-md-6">
            <div class="card card-pos">
                <div class="card-header-custom">
                    <i class="bi bi-lightning-charge-fill" style="color:var(--pos-primary);"></i>
                    빠른 이동
                </div>
                <div class="p-3 d-grid gap-2">
                    <a href="/checkout" class="quick-link quick-link-primary">
                        <i class="bi bi-cart-check-fill"></i>
                        <div>
                            <div>판매 / 결제 시작</div>
                            <small style="opacity:0.7; font-weight:400;">체크아웃 화면으로 이동</small>
                        </div>
                    </a>
                    <a href="/products/new" class="quick-link quick-link-outline">
                        <i class="bi bi-plus-circle-fill"></i>
                        <div>새 상품 등록</div>
                    </a>
                    <a href="/statistics" class="quick-link quick-link-outline">
                        <i class="bi bi-graph-up-arrow"></i>
                        <div>매출 통계 보기</div>
                    </a>
                    <a href="/sales" class="quick-link quick-link-outline">
                        <i class="bi bi-clock-history"></i>
                        <div>판매 이력 조회</div>
                    </a>
                </div>
            </div>
        </div>

        <!-- 재고 부족 알림 -->
        <div class="col-md-6">
            <div class="card card-pos">
                <div class="card-header-custom">
                    <i class="bi bi-exclamation-triangle-fill" style="color:var(--pos-danger);"></i>
                    재고 부족 알림
                </div>
                <div class="p-3" id="lowStockList">
                    <div class="text-center text-muted py-4">
                        <i class="bi bi-check-circle" style="font-size:2rem; display:block; margin-bottom:0.5rem; opacity:0.3;"></i>
                        재고 부족 상품이 없습니다
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('todayDate').textContent =
        new Date().toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'long'});

    fetch('/api/stats/today')
        .then(r => r.json())
        .then(data => {
            document.getElementById('todaySales').textContent = formatMoney(data.total_sales);
            document.getElementById('todayCash').textContent = formatMoney(data.total_cash);
            document.getElementById('todayCard').textContent = formatMoney(data.total_card);
            document.getElementById('todayCount').textContent = data.transaction_count;
        });

    fetch('/api/products/low-stock')
        .then(r => r.json())
        .then(data => {
            const el = document.getElementById('lowStockList');
            if (data.length === 0) return;
            let html = '<div class="px-1">';
            data.forEach(p => {
                html += `<div class="low-stock-item">
                    <span style="font-weight:500;">${p.name}</span>
                    <span class="badge bg-danger">${p.stock_quantity} ${p.unit_label}</span>
                </div>`;
            });
            html += '</div>';
            el.innerHTML = html;
        });
</script>
{% endblock %}
