{% extends "base.html" %}
{% block title %}매출 통계{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="page-header mb-4">
        <h4><i class="bi bi-graph-up-arrow" style="color:var(--pos-primary);"></i> 매출 통계</h4>
    </div>

    <!-- 기간 선택 -->
    <div class="card card-pos p-3 mb-4">
        <div class="row g-2 align-items-end">
            <div class="col-md-2">
                <label class="form-label">연도</label>
                <select id="statYear" class="form-select" onchange="loadStats()">
                    {% for y in years %}
                    <option value="{{ y }}" {% if y == current_year %}selected{% endif %}>{{ y }}년</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">월</label>
                <select id="statMonth" class="form-select" onchange="loadStats()">
                    {% for m in range(1, 13) %}
                    <option value="{{ m }}" {% if m == current_month %}selected{% endif %}>{{ m }}월</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <!-- 일별 매출 차트 -->
        <div class="col-lg-8">
            <div class="card card-pos p-3">
                <h6 class="mb-3">일별 매출</h6>
                <canvas id="dailyChart" height="250"></canvas>
            </div>
        </div>

        <!-- 결제 방법 비율 -->
        <div class="col-lg-4">
            <div class="card card-pos p-3">
                <h6 class="mb-3">결제 방법 비율</h6>
                <canvas id="paymentChart" height="250"></canvas>
            </div>
        </div>

        <!-- 인기 상품 (판매량) -->
        <div class="col-lg-6">
            <div class="card card-pos p-3">
                <h6 class="mb-3">인기 상품 (판매량 TOP 10)</h6>
                <canvas id="topQtyChart" height="300"></canvas>
            </div>
        </div>

        <!-- 인기 상품 (매출액) -->
        <div class="col-lg-6">
            <div class="card card-pos p-3">
                <h6 class="mb-3">인기 상품 (매출액 TOP 10)</h6>
                <canvas id="topRevenueChart" height="300"></canvas>
            </div>
        </div>

        <!-- 카테고리별 매출 -->
        <div class="col-lg-6">
            <div class="card card-pos p-3">
                <h6 class="mb-3">카테고리별 매출</h6>
                <canvas id="categoryChart" height="300"></canvas>
            </div>
        </div>

        <!-- 월별 매출 추이 -->
        <div class="col-lg-6">
            <div class="card card-pos p-3">
                <h6 class="mb-3">월별 매출 추이</h6>
                <canvas id="monthlyChart" height="300"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/chart.min.js') }}"></script>
<script>
    let charts = {};

    const COLORS = [
        '#667eea','#f5576c','#2af598','#4facfe','#ffc107',
        '#e91e63','#9c27b0','#00bcd4','#ff9800','#795548'
    ];

    function loadStats() {
        const year = document.getElementById('statYear').value;
        const month = document.getElementById('statMonth').value;

        // 일별 매출
        fetch(`/api/stats/daily?year=${year}&month=${month}`)
            .then(r => r.json())
            .then(data => renderDailyChart(data, year, month));

        // 월별 매출
        fetch(`/api/stats/monthly?year=${year}`)
            .then(r => r.json())
            .then(data => renderMonthlyChart(data));

        // 인기 상품
        const from = `${year}-${String(month).padStart(2,'0')}-01`;
        const lastDay = new Date(year, month, 0).getDate();
        const to = `${year}-${String(month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;

        fetch(`/api/stats/top-products?date_from=${from}&date_to=${to}&order_by=quantity&limit=10`)
            .then(r => r.json())
            .then(data => renderTopChart('topQtyChart', data, 'total_qty', '판매량'));

        fetch(`/api/stats/top-products?date_from=${from}&date_to=${to}&order_by=revenue&limit=10`)
            .then(r => r.json())
            .then(data => renderTopChart('topRevenueChart', data, 'total_revenue', '매출액'));

        fetch(`/api/stats/categories?date_from=${from}&date_to=${to}`)
            .then(r => r.json())
            .then(data => renderCategoryChart(data));
    }

    function destroyChart(name) {
        if (charts[name]) { charts[name].destroy(); }
    }

    function renderDailyChart(data, year, month) {
        destroyChart('daily');
        const daysInMonth = new Date(year, month, 0).getDate();
        const labels = Array.from({length: daysInMonth}, (_, i) => `${i+1}일`);

        const salesData = new Array(daysInMonth).fill(0);
        const cashData = new Array(daysInMonth).fill(0);
        const cardData = new Array(daysInMonth).fill(0);

        data.forEach(d => {
            const day = parseInt(d.day.split('-')[2]) - 1;
            salesData[day] = d.total;
            cashData[day] = d.cash;
            cardData[day] = d.card;
        });

        // 결제 비율 파이차트 데이터
        const totalCash = cashData.reduce((a, b) => a + b, 0);
        const totalCard = cardData.reduce((a, b) => a + b, 0);
        renderPaymentChart(totalCash, totalCard);

        charts['daily'] = new Chart(document.getElementById('dailyChart'), {
            type: 'bar',
            data: {
                labels,
                datasets: [
                    { label: '현금', data: cashData, backgroundColor: '#2af598aa', stack: 'sales' },
                    { label: '카드', data: cardData, backgroundColor: '#667eeaaa', stack: 'sales' }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: 'top' } },
                scales: {
                    y: { beginAtZero: true, ticks: { callback: v => '₩' + v.toLocaleString() } }
                }
            }
        });
    }

    function renderPaymentChart(cash, card) {
        destroyChart('payment');
        charts['payment'] = new Chart(document.getElementById('paymentChart'), {
            type: 'doughnut',
            data: {
                labels: ['현금', '카드'],
                datasets: [{
                    data: [cash, card],
                    backgroundColor: ['#2af598', '#667eea']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: { callbacks: { label: ctx => `₩${ctx.raw.toLocaleString()}` } }
                }
            }
        });
    }

    function renderMonthlyChart(data) {
        destroyChart('monthly');
        const labels = data.map(d => `${parseInt(d.month)}월`);
        charts['monthly'] = new Chart(document.getElementById('monthlyChart'), {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: '월 매출',
                    data: data.map(d => d.total),
                    borderColor: '#667eea',
                    backgroundColor: '#667eea22',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, ticks: { callback: v => '₩' + v.toLocaleString() } }
                }
            }
        });
    }

    function renderTopChart(canvasId, data, field, label) {
        const chartName = canvasId;
        destroyChart(chartName);
        charts[chartName] = new Chart(document.getElementById(canvasId), {
            type: 'bar',
            data: {
                labels: data.map(d => d.product_name.length > 12 ? d.product_name.slice(0,12)+'...' : d.product_name),
                datasets: [{
                    label,
                    data: data.map(d => d[field]),
                    backgroundColor: data.map((_, i) => COLORS[i % COLORS.length])
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        beginAtZero: true,
                        ticks: { callback: v => field === 'total_revenue' ? '₩'+v.toLocaleString() : v }
                    }
                }
            }
        });
    }

    function renderCategoryChart(data) {
        destroyChart('category');
        charts['category'] = new Chart(document.getElementById('categoryChart'), {
            type: 'pie',
            data: {
                labels: data.map(d => d.category_name || '미분류'),
                datasets: [{
                    data: data.map(d => d.total_revenue),
                    backgroundColor: data.map((_, i) => COLORS[i % COLORS.length])
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'right', labels: { font: { size: 11 } } },
                    tooltip: { callbacks: { label: ctx => `₩${ctx.raw.toLocaleString()}` } }
                }
            }
        });
    }

    // 초기 로드
    loadStats();
</script>
{% endblock %}
