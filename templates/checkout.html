{% extends "base.html" %}
{% block title %}판매/결제{% endblock %}

{% block head %}
<style>
    body { overflow: hidden; }
</style>
{% endblock %}

{% block content %}
<div class="checkout-container">
    <div class="row g-0 h-100">
        <!-- 왼쪽: 상품 검색 -->
        <div class="col-md-6 checkout-left">
            <!-- 바코드 입력 -->
            <div class="barcode-wrap mb-2">
                <input type="text" id="barcodeInput" class="form-control barcode-input"
                       placeholder="바코드 스캔 (F2)" autocomplete="off">
            </div>

            <!-- 상품 검색 -->
            <div class="search-box mb-3">
                <input type="text" id="searchInput" class="form-control"
                       placeholder="상품명 검색 (F1)" autocomplete="off">
                <div id="searchResults" class="search-results" style="display:none;"></div>
            </div>

            <!-- 카테고리 필터 -->
            <div class="d-flex flex-wrap gap-2 mb-3">
                <button class="category-btn active" data-id="">전체</button>
                {% for cat in categories %}
                <button class="category-btn" data-id="{{ cat.id }}">{{ cat.name }}</button>
                {% endfor %}
            </div>

            <!-- 카테고리별 상품 목록 -->
            <div id="productGrid" class="search-results" style="display:none; max-height:calc(100vh - 280px);"></div>
        </div>

        <!-- 오른쪽: 장바구니 + 결제 -->
        <div class="col-md-6 checkout-right">
            <h5 class="mb-2"><i class="bi bi-cart3"></i> 장바구니 <span class="text-muted" style="font-weight:400;" id="cartCount">(0)</span></h5>

            <!-- 장바구니 목록 -->
            <div class="cart-container" id="cartList">
                <div class="cart-empty">
                    <i class="bi bi-cart-x"></i>
                    상품을 추가해주세요
                </div>
            </div>

            <!-- 결제 영역 -->
            <div class="payment-area">
                <div class="d-flex justify-content-between align-items-end mb-2">
                    <div class="total-label">합계</div>
                    <div class="total-display" id="cartTotal">₩0</div>
                </div>
                <button class="btn btn-payment" id="btnPay" disabled onclick="openPaymentModal()">
                    <i class="bi bi-credit-card-2-front"></i> 결제하기 (F4)
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 수량 입력 모달 -->
<div class="modal fade" id="qtyModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="qtyModalTitle">수량 입력</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p id="qtyProductInfo" class="text-muted mb-2"></p>
                <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
                    <button class="btn btn-outline-secondary qty-btn" onclick="adjustQty(-1)">-</button>
                    <input type="number" id="qtyInput" class="qty-input" style="width:120px;" value="1" min="0.1">
                    <button class="btn btn-outline-secondary qty-btn" onclick="adjustQty(1)">+</button>
                </div>
                <p id="qtySubtotal" class="fw-bold fs-5"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary btn-pos" onclick="confirmAddToCart()">추가</button>
            </div>
        </div>
    </div>
</div>

<!-- 결제 모달 -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">결제</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="text-center mb-3">
                    <div class="total-label">결제 금액</div>
                    <div class="total-display" id="payTotal">₩0</div>
                </div>

                <!-- 결제 방법 선택 -->
                <div class="d-flex gap-2 mb-3 pay-method-group" role="group">
                    <input type="radio" class="btn-check" name="payMethod" id="payCash" value="cash" checked>
                    <label class="btn btn-outline-success btn-pos flex-fill" for="payCash"><i class="bi bi-wallet2"></i> 현금</label>
                    <input type="radio" class="btn-check" name="payMethod" id="payCard" value="card">
                    <label class="btn btn-outline-primary btn-pos flex-fill" for="payCard"><i class="bi bi-credit-card"></i> 카드</label>
                    <input type="radio" class="btn-check" name="payMethod" id="payMixed" value="mixed">
                    <label class="btn btn-outline-secondary btn-pos flex-fill" for="payMixed"><i class="bi bi-arrow-left-right"></i> 혼합</label>
                </div>

                <!-- 현금 입력 -->
                <div id="cashSection">
                    <label class="form-label fw-bold">받은 금액 (현금)</label>
                    <input type="number" id="cashInput" class="form-control payment-input mb-2"
                           placeholder="0" oninput="calcChange()">
                    <!-- 빠른 금액 버튼 -->
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <button class="quick-cash-btn" onclick="quickCash(1000)">₩1,000</button>
                        <button class="quick-cash-btn" onclick="quickCash(5000)">₩5,000</button>
                        <button class="quick-cash-btn" onclick="quickCash(10000)">₩10,000</button>
                        <button class="quick-cash-btn" onclick="quickCash(50000)">₩50,000</button>
                        <button class="quick-cash-btn" onclick="quickCash('exact')">딱 맞게</button>
                    </div>
                </div>

                <!-- 카드 입력 (혼합 결제 시) -->
                <div id="cardSection" style="display:none;">
                    <label class="form-label fw-bold">카드 결제 금액</label>
                    <input type="number" id="cardInput" class="form-control payment-input mb-2"
                           placeholder="0" oninput="calcChange()">
                </div>

                <!-- 거스름돈 -->
                <div id="changeSection" class="change-display">
                    거스름돈: ₩0
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-success btn-pos btn-lg" id="btnConfirmPay" onclick="processPayment()">
                    결제 완료
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 결제 완료 모달 -->
<div class="modal fade" id="completeModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center">
            <div class="modal-body py-5">
                <div style="font-size:4.5rem; color:var(--pos-success);"><i class="bi bi-check-circle-fill"></i></div>
                <h3 class="mt-3 fw-bold">결제 완료!</h3>
                <p class="text-muted" id="completeInfo"></p>
            </div>
            <div class="modal-footer justify-content-center">
                <a id="receiptLink" href="#" target="_blank" class="btn btn-outline-primary btn-pos">영수증 인쇄</a>
                <button type="button" class="btn btn-primary btn-pos" onclick="startNewSale()">새 판매</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // ── 유틸 ──
    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    // ── 단위 유형 정보 ──
    const UNIT_TYPES = {{ unit_types | tojson }};

    // ── 장바구니 상태 ──
    let cart = [];
    let selectedProduct = null;

    // ── 초기화 ──
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('barcodeInput').focus();
        setupEventListeners();
    });

    function setupEventListeners() {
        // 바코드 입력
        const barcodeInput = document.getElementById('barcodeInput');
        barcodeInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && barcodeInput.value.trim()) {
                searchBarcode(barcodeInput.value.trim());
                barcodeInput.value = '';
            }
        });

        // 상품 검색 (디바운스)
        const searchInput = document.getElementById('searchInput');
        let searchTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            const q = searchInput.value.trim();
            if (q.length < 1) {
                document.getElementById('searchResults').style.display = 'none';
                return;
            }
            searchTimer = setTimeout(() => searchProducts(q), 200);
        });

        // 카테고리 버튼
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadCategoryProducts(btn.dataset.id);
            });
        });

        // 결제 방법 토글
        document.querySelectorAll('input[name="payMethod"]').forEach(radio => {
            radio.addEventListener('change', togglePaymentSections);
        });

        // 수량 입력 엔터
        document.getElementById('qtyInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') confirmAddToCart();
        });

        // 키보드 단축키
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' && e.key !== 'F1' && e.key !== 'F2' && e.key !== 'F4' && e.key !== 'Escape') return;

            if (e.key === 'F1') { e.preventDefault(); searchInput.focus(); }
            else if (e.key === 'F2') { e.preventDefault(); barcodeInput.focus(); }
            else if (e.key === 'F4') { e.preventDefault(); openPaymentModal(); }
            else if (e.key === 'Escape') {
                bootstrap.Modal.getInstance(document.getElementById('qtyModal'))?.hide();
                bootstrap.Modal.getInstance(document.getElementById('paymentModal'))?.hide();
            }
        });

        // 결제 모달 엔터키
        document.getElementById('paymentModal').addEventListener('keydown', e => {
            if (e.key === 'Enter') processPayment();
        });
    }

    // ── 상품 검색 ──
    async function searchProducts(query) {
        const res = await fetch(`/api/products/search?q=${encodeURIComponent(query)}`);
        const products = await res.json();
        const container = document.getElementById('searchResults');

        if (products.length === 0) {
            container.innerHTML = '<div class="p-3 text-muted text-center">검색 결과가 없습니다</div>';
        } else {
            container.innerHTML = products.map((p, i) => `
                <div class="search-result-item" data-idx="${i}">
                    <div>
                        <strong>${escapeHtml(p.name)}</strong>
                        <small class="text-muted ms-2">${escapeHtml(p.barcode || '')}</small>
                    </div>
                    <div>
                        <span class="fw-bold text-primary">${formatMoney(p.price)}/${UNIT_TYPES[p.unit_type]?.label || p.unit_type}</span>
                        ${p.bulk_price ? `<br><small class="text-warning">${p.bulk_threshold}${UNIT_TYPES[p.unit_type]?.label}이상 ${formatMoney(p.bulk_price)}</small>` : ''}
                    </div>
                </div>
            `).join('');
            container.querySelectorAll('[data-idx]').forEach(el => {
                el.addEventListener('click', () => selectProduct(products[+el.dataset.idx]));
            });
        }
        container.style.display = 'block';
    }

    async function searchBarcode(barcode) {
        const res = await fetch(`/api/products/search?q=${encodeURIComponent(barcode)}`);
        const products = await res.json();
        if (products.length === 1) {
            selectProduct(products[0]);
        } else if (products.length === 0) {
            showToast('알림', '등록되지 않은 바코드입니다', 'warning');
        }
    }

    async function loadCategoryProducts(categoryId) {
        const url = categoryId ? `/api/products/by-category?category_id=${categoryId}` : `/api/products/by-category`;
        const res = await fetch(url);
        const products = await res.json();
        const container = document.getElementById('productGrid');

        if (products.length === 0) {
            container.innerHTML = '<div class="p-3 text-muted text-center">상품이 없습니다</div>';
        } else {
            container.innerHTML = products.map((p, i) => `
                <div class="search-result-item" data-cat-idx="${i}">
                    <div><strong>${escapeHtml(p.name)}</strong></div>
                    <span class="fw-bold text-primary">${formatMoney(p.price)}/${UNIT_TYPES[p.unit_type]?.label || p.unit_type}</span>
                </div>
            `).join('');
            container.querySelectorAll('[data-cat-idx]').forEach(el => {
                el.addEventListener('click', () => selectProduct(products[+el.dataset.catIdx]));
            });
        }
        container.style.display = 'block';
        document.getElementById('searchResults').style.display = 'none';
    }

    // ── 수량 입력 모달 ──
    function selectProduct(product) {
        selectedProduct = product;
        const unit = UNIT_TYPES[product.unit_type] || {label: product.unit_type, decimal: false, step: 1};

        document.getElementById('qtyModalTitle').textContent = '수량 입력';
        document.getElementById('qtyProductInfo').textContent =
            `${product.name} - ${formatMoney(product.price)}/${unit.label}`;

        const qtyInput = document.getElementById('qtyInput');
        qtyInput.value = unit.decimal ? '1.0' : '1';
        qtyInput.step = unit.step;
        qtyInput.min = unit.step;
        updateQtySubtotal();

        const modal = new bootstrap.Modal(document.getElementById('qtyModal'));
        modal.show();
        setTimeout(() => { qtyInput.select(); }, 300);

        // 검색 결과 닫기
        document.getElementById('searchResults').style.display = 'none';
        document.getElementById('searchInput').value = '';
    }

    function adjustQty(delta) {
        const input = document.getElementById('qtyInput');
        const step = parseFloat(input.step) || 1;
        let val = parseFloat(input.value) || 0;
        val = Math.max(step, val + delta * step);
        input.value = step < 1 ? val.toFixed(1) : Math.round(val);
        updateQtySubtotal();
    }

    function updateQtySubtotal() {
        if (!selectedProduct) return;
        const qty = parseFloat(document.getElementById('qtyInput').value) || 0;
        const unit = UNIT_TYPES[selectedProduct.unit_type] || {label: ''};
        let price = selectedProduct.price;
        let bulkText = '';

        if (selectedProduct.bulk_threshold && selectedProduct.bulk_price && qty >= selectedProduct.bulk_threshold) {
            price = selectedProduct.bulk_price;
            bulkText = ' (도매가)';
        }

        document.getElementById('qtySubtotal').textContent =
            `${formatMoney(price * qty)}${bulkText}`;
    }

    document.getElementById('qtyInput')?.addEventListener('input', updateQtySubtotal);

    function confirmAddToCart() {
        if (!selectedProduct) return;
        const qty = parseFloat(document.getElementById('qtyInput').value) || 0;
        if (qty <= 0) return;

        addToCart(selectedProduct, qty);
        bootstrap.Modal.getInstance(document.getElementById('qtyModal')).hide();
        selectedProduct = null;
        document.getElementById('barcodeInput').focus();
    }

    // ── 장바구니 ──
    function addToCart(product, quantity) {
        const existing = cart.find(item => item.product_id === product.id);
        if (existing) {
            existing.quantity += quantity;
            const result = calcLineTotal(product, existing.quantity);
            existing.unit_price = result.unitPrice;
            existing.subtotal = result.subtotal;
            existing.is_bulk = result.isBulk;
        } else {
            const result = calcLineTotal(product, quantity);
            cart.push({
                product_id: product.id,
                product_name: product.name,
                unit_type: product.unit_type,
                quantity: quantity,
                unit_price: result.unitPrice,
                original_price: product.price,
                bulk_price: product.bulk_price,
                bulk_threshold: product.bulk_threshold,
                subtotal: result.subtotal,
                is_bulk: result.isBulk
            });
        }
        renderCart();
    }

    function calcLineTotal(product, qty) {
        let isBulk = false;
        let unitPrice = product.price;
        if (product.bulk_threshold && product.bulk_price && qty >= product.bulk_threshold) {
            unitPrice = product.bulk_price;
            isBulk = true;
        }
        return { unitPrice, subtotal: unitPrice * qty, isBulk };
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function updateCartQty(index, newQty) {
        if (newQty <= 0) { removeFromCart(index); return; }
        const item = cart[index];
        item.quantity = newQty;

        let isBulk = false;
        let unitPrice = item.original_price;
        if (item.bulk_threshold && item.bulk_price && newQty >= item.bulk_threshold) {
            unitPrice = item.bulk_price;
            isBulk = true;
        }
        item.unit_price = unitPrice;
        item.subtotal = unitPrice * newQty;
        item.is_bulk = isBulk;
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cartList');
        const countEl = document.getElementById('cartCount');
        const totalEl = document.getElementById('cartTotal');
        const btnPay = document.getElementById('btnPay');

        if (cart.length === 0) {
            container.innerHTML = '<div class="cart-empty">상품을 추가해주세요</div>';
            countEl.textContent = '(0)';
            totalEl.textContent = '₩0';
            btnPay.disabled = true;
            return;
        }

        const unit = (type) => UNIT_TYPES[type]?.label || type;
        const step = (type) => UNIT_TYPES[type]?.decimal ? '0.1' : '1';

        container.innerHTML = cart.map((item, i) => `
            <div class="cart-item">
                <div class="item-name">
                    ${escapeHtml(item.product_name)}
                    ${item.is_bulk ? '<span class="badge-bulk">도매가</span>' : ''}
                    ${item.is_bulk ? `<br><small class="price-original">${formatMoney(item.original_price)}/${unit(item.unit_type)}</small>
                        <small class="text-success">&rarr; ${formatMoney(item.unit_price)}/${unit(item.unit_type)}</small>` : ''}
                </div>
                <div class="item-qty">
                    <input type="number" class="form-control form-control-sm text-center" value="${item.quantity}"
                           min="${step(item.unit_type)}" step="${step(item.unit_type)}"
                           onchange="updateCartQty(${i}, parseFloat(this.value))"
                           style="width:75px;">
                    <small class="text-muted">${unit(item.unit_type)}</small>
                </div>
                <div class="item-price">${formatMoney(item.subtotal)}</div>
                <button class="btn-remove" onclick="removeFromCart(${i})">&times;</button>
            </div>
        `).join('');

        const total = cart.reduce((sum, item) => sum + item.subtotal, 0);
        countEl.textContent = `(${cart.length})`;
        totalEl.textContent = formatMoney(total);
        btnPay.disabled = false;
    }

    // ── 결제 ──
    function openPaymentModal() {
        if (cart.length === 0) return;
        const total = cart.reduce((sum, item) => sum + item.subtotal, 0);
        document.getElementById('payTotal').textContent = formatMoney(total);
        document.getElementById('cashInput').value = '';
        document.getElementById('cardInput').value = '';
        document.getElementById('payCash').checked = true;
        togglePaymentSections();
        calcChange();

        const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
        modal.show();
        setTimeout(() => document.getElementById('cashInput').focus(), 300);
    }

    function togglePaymentSections() {
        const method = document.querySelector('input[name="payMethod"]:checked').value;
        document.getElementById('cashSection').style.display = (method === 'card') ? 'none' : 'block';
        document.getElementById('cardSection').style.display = (method === 'mixed') ? 'block' : 'none';
        document.getElementById('changeSection').style.display = (method === 'card') ? 'none' : 'block';
        calcChange();
    }

    function quickCash(amount) {
        const total = cart.reduce((sum, item) => sum + item.subtotal, 0);
        if (amount === 'exact') {
            document.getElementById('cashInput').value = Math.round(total);
        } else {
            document.getElementById('cashInput').value =
                (parseInt(document.getElementById('cashInput').value) || 0) + amount;
        }
        calcChange();
    }

    function calcChange() {
        const total = cart.reduce((sum, item) => sum + item.subtotal, 0);
        const method = document.querySelector('input[name="payMethod"]:checked').value;
        const cashInput = parseInt(document.getElementById('cashInput').value) || 0;
        const cardInput = parseInt(document.getElementById('cardInput').value) || 0;

        let change = 0;
        if (method === 'cash') {
            change = cashInput - Math.round(total);
        } else if (method === 'mixed') {
            change = (cashInput + cardInput) - Math.round(total);
        }

        const changeEl = document.getElementById('changeSection');
        if (change >= 0) {
            changeEl.textContent = `거스름돈: ${formatMoney(change)}`;
            changeEl.style.color = 'var(--pos-success)';
            changeEl.style.backgroundColor = '#e8f5e9';
        } else {
            changeEl.textContent = `부족: ${formatMoney(Math.abs(change))}`;
            changeEl.style.color = 'var(--pos-danger)';
            changeEl.style.backgroundColor = '#fce4ec';
        }
    }

    async function processPayment() {
        const total = cart.reduce((sum, item) => sum + item.subtotal, 0);
        const method = document.querySelector('input[name="payMethod"]:checked').value;
        const cashInput = parseInt(document.getElementById('cashInput').value) || 0;
        const cardInput = parseInt(document.getElementById('cardInput').value) || 0;

        let cashAmount = 0, cardAmount = 0, changeAmount = 0;

        if (method === 'cash') {
            cashAmount = cashInput || Math.round(total);
            changeAmount = cashAmount - Math.round(total);
            if (changeAmount < 0) { showToast('오류', '받은 금액이 부족합니다', 'error'); return; }
        } else if (method === 'card') {
            cardAmount = Math.round(total);
        } else { // mixed
            cashAmount = cashInput;
            cardAmount = cardInput;
            if (cashAmount + cardAmount < Math.round(total)) {
                showToast('오류', '결제 금액이 부족합니다', 'error'); return;
            }
            changeAmount = (cashAmount + cardAmount) - Math.round(total);
        }

        const payload = {
            items: cart.map(item => ({
                product_id: item.product_id,
                product_name: item.product_name,
                unit_type: item.unit_type,
                quantity: item.quantity,
                unit_price: item.unit_price,
                subtotal: item.subtotal,
                is_bulk: item.is_bulk ? 1 : 0
            })),
            payment_method: method,
            cash_amount: cashAmount,
            card_amount: cardAmount,
            change_amount: changeAmount
        };

        try {
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const result = await res.json();

            if (result.success) {
                bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
                document.getElementById('completeInfo').textContent =
                    `${formatMoney(total)} | ${method === 'cash' ? '현금' : method === 'card' ? '카드' : '혼합'} 결제`;
                document.getElementById('receiptLink').href = `/sales/${result.sale_id}/receipt`;
                new bootstrap.Modal(document.getElementById('completeModal')).show();
            } else {
                showToast('오류', result.error || '결제 처리 실패', 'error');
            }
        } catch (err) {
            showToast('오류', '서버 연결 실패', 'error');
        }
    }

    function startNewSale() {
        cart = [];
        renderCart();
        bootstrap.Modal.getInstance(document.getElementById('completeModal')).hide();
        document.getElementById('barcodeInput').focus();
    }
</script>
{% endblock %}
